<!DOCTYPE html>
<html lang="en">
<head>
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">
    <h1>Rock Paper Scissors</h1>
    <p>Welcome to the game!</p>
    <h2>Choose your move</h2>
    <form action="/play" method="post">
        <button type="submit" name="choice" value="rock">🪨Rock</button>
        <button type="submit" name="choice" value="paper">📃Paper</button>
        <button type="submit" name="choice" value="scissors">✂️Scissors</button>
    </form>
    <div class="result">
        <h3>Score Board</h3>
        <p>Wins: {{ session.wins }}</p>
        <p>Losses: {{ session.losses }}</p>
        <p>Draws: {{ session.draws }}</p>
    </div>
    <a href="/reset">
        Reset Score
    </a>
</body>
</html>
